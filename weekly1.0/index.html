<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">

    <!-- SEO -->
    <title>Weekly 2.0 – Organisation hebdomadaire</title>
    <meta name="description" content="Weekly 2.0 – Organisation de la semaine, objectifs et planification personnelle.">

    <!-- Fond + Style Premium (identique à ta page d’accueil) -->
    <style>
        body {
            margin: 0;
            padding: 0;
            background-image: linear-gradient(
                rgba(0, 0, 0, 0.45),
                rgba(0, 0, 0, 0.65)
            ), url('chakra.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            font-family: "Georgia", serif;
            color: #f5f5f5;
        }

        /* Cadre premium */
        .container {
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(6px);
            padding: 50px;
            margin: 70px auto;
            width: 92%;
            max-width: 850px;
            border-radius: 25px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.15);
        }

        h1 {
            font-size: 42px;
            margin-bottom: 5px;
            color: #ffffff;
            letter-spacing: 1px;
            text-shadow: 0 0 6px rgba(0,0,0,0.6);
        }

        .line {
            width: 120px;
            height: 3px;
            background: #ffffff;
            margin: 10px auto 25px auto;
            border-radius: 3px;
            opacity: 0.8;
        }

        h2 {
            font-size: 26px;
            margin-bottom: 25px;
            color: #eaeaea;
            font-weight: normal;
            text-shadow: 0 0 4px rgba(0,0,0,0.5);
        }

        /* Tableau Weekly */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 25px;
        }

        th, td {
            padding: 14px;
            border-bottom: 1px solid rgba(255,255,255,0.15);
            font-size: 19px;
        }

        th {
            color: #ffffff;
            font-size: 21px;
            text-shadow: 0 0 4px rgba(0,0,0,0.6);
        }

        /* Responsive */
        @media (max-width: 600px) {
            .container {
                padding: 35px;
                margin: 30px auto;
            }

            h1 {
                font-size: 32px;
            }

            th, td {
                font-size: 17px;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>Weekly 2.0</h1>
        <div class="line"></div>
        <h2>Organisation de la semaine</h2>

        <table>
            <tr><th>Lundi</th><td>…</td></tr>
            <tr><th>Mardi</th><td>…</td></tr>
            <tr><th>Mercredi</th><td>…</td></tr>
            <tr><th>Jeudi</th><td>…</td></tr>
            <tr><th>Vendredi</th><td>…</td></tr>
            <tr><th>Samedi</th><td>…</td></tr>
            <tr><th>Dimanche</th><td>…</td></tr>
        </table>

    </div>

</body>
</html>
