<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">

    <!-- SEO -->
    <title>Weekly 2.0 – Organisation hebdomadaire</title>
    <meta name="description" content="Weekly 2.0 – Organisation de la semaine, objectifs et planification personnelle.">

    <!-- Fond + Style Premium (identique à ta page d’accueil) -->
    <style>
        body {
            margin: 0;
            padding: 0;
            background-image: linear-gradient(
                rgba(0, 0, 0, 0.45),
                rgba(0, 0, 0, 0.65)
            ), url('chakra.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            font-family: "Georgia", serif;
            color: #f5f5f5;
        }

        /* Cadre premium */
        .container {
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(6px);
            padding: 50px;
            margin: 70px auto;
            width: 92%;
            max-width: 850px;
            border-radius: 25px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.15);
        }

        h1 {
            font-size: 42px;
            margin-bottom: 5px;
            color: #ffffff;
            letter-spacing: 1px;
            text-shadow: 0 0 6px rgba(0,0,0,0.6);
        }

        .line {
            width: 120px;
            height: 3px;
            background: #ffffff;
            margin: 10px auto 25px auto;
            border-radius: 3px;
            opacity: 0.8;
        }

        h2 {
            font-size: 26px;
            margin-bottom: 25px;
            color: #eaeaea;
            font-weight: normal;
            text-shadow: 0 0 4px rgba(0,0,0,0.5);
        }

        p {
            font-size: 20px;
            line-height: 1.7;
            color: #f0f0f0;
            text-shadow: 0 0 4px rgba(0,0,0,0.8);
        }

        /* Responsive */
        @media (max-width: 600px) {
            .container {
                padding: 35px;
                margin: 30px auto;
            }

            h1 {
                font-size: 32px;
            }

            p {
                font-size: 18px;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>Weekly 2.0</h1>
        <div class="line"></div>
        <h2>Organisation de la semaine</h2>

        <p>
            Votre organisation hebdomadaire simplifiée.<br>
            Disponible du lundi au dimanche, de 11h00 à 18h00, uniquement sur rendez-vous.<br><br>
            Weekly 2.0 vous permet de garder une vision claire et élégante de votre semaine,
            dans un format premium et minimaliste.
        </p>

    </div>

</body>
</html>
